<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Points Challenge</title>
  <link rel="stylesheet" href="onboarding.css" />
</head>
<body>
  <main class="onboarding-shell">
    <section class="onboarding-card" aria-labelledby="welcomeTitle">
      <h1 id="welcomeTitle">The Points Challenge</h1>
      <p class="intro-copy">
        Enter the maze, collect as many pellets as you can, and avoid being eaten by the ghosts!
      </p>

      <form id="onboardingForm" class="onboarding-form">
        <label class="field">
          <span>Nickname</span>
          <input
            id="nicknameInput"
            name="nickname"
            type="text"
            maxlength="18"
            placeholder="Enter a nickname"
            autocomplete="nickname"
            required
          />
        </label>

        <fieldset class="avatar-fieldset">
          <legend>Choose an avatar</legend>
          <div id="avatarOptions" class="avatar-grid"></div>
        </fieldset>

        <div class="profile-preview">
          <span id="selectedAvatarPreview" class="profile-preview__avatar">⚡</span>
          <div>
            <p id="selectedNamePreview" class="profile-preview__name">Player</p>
            <p class="profile-preview__meta">Ready to start</p>
          </div>
        </div>

        <button type="submit" class="start-button">Start Challenge</button>
      </form>
    </section>
  </main>

  <script src="onboarding.js"></script>
</body>
</html>
